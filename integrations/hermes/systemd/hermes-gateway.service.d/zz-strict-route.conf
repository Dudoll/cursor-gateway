# main: bind canonical HERMES_HOME. Requires/After keep watcher wanted.
# Intentionally no BindsTo — avoid session-drift/health-blip killing the gateway.
[Unit]
Requires=hermes-strict-route-guard@main.service
After=hermes-strict-route-guard@main.service

[Service]
Environment=HERMES_HOME=%h/.hermes
Environment=HERMES_STRICT_ROUTE_ENABLED=1
Environment=HERMES_STRICT_ROUTE_ACTIVE_PROFILE=main
Environment=HERMES_STRICT_ROUTE_PROFILE=main
Environment=HERMES_STRICT_ROUTE_HOME=%h/.hermes
Environment=HERMES_STRICT_ROUTE_SERVICE=hermes-gateway.service
Environment=HERMES_STRICT_ROUTE_PROVIDER=cursor-gateway
Environment=HERMES_STRICT_ROUTE_MODEL=gpt-5.6-sol
Environment=HERMES_DISABLE_MCP=1
Environment=HERMES_STRICT_ROUTE_BASE_URL=http://127.0.0.1:18080/v1
Environment=HERMES_STRICT_ROUTE_PROBE_TIMEOUT=3
Environment=HERMES_API_TIMEOUT=1860
Environment=HERMES_STREAM_READ_TIMEOUT=1860
ExecStartPre=/usr/bin/env %h/.hermes/hermes-agent/venv/bin/python \
  %h/cursor-gateway/integrations/hermes/cursor-gateway/strict_route_guard.py \
  preflight \
  --profile main \
  --profiles-file %h/.config/hermes/strict-route-profiles.json \
  --expected-service hermes-gateway.service \
  --expected-home %h/.hermes \
  --require-protected \
  --check-environment-home
Restart=no
