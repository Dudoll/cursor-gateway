name: desktop-windows

# Builds the Windows desktop client (Tauri v2 + WebView2) and produces an NSIS
# `.exe` installer plus SHA256SUMS. This is the "one-click on a Windows machine"
# path referenced in docs/windows-client.md — the Linux/WSL dev box cannot
# cross-compile the Windows bundle, so CI (or any Windows host) does the packaging.

on:
  workflow_dispatch:
    inputs:
      with_msi:
        description: "Also build an MSI (WiX) bundle"
        type: boolean
        default: false
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri

      - name: Install workspace dependencies
        run: npm install

      - name: Build Secure Web frontend (bundled into the shell)
        # secure-web imports @cursor-gateway/shared and @cursor-gateway/e2ee via
        # their compiled dist/ (gitignored), so build those workspaces first.
        run: |
          npm run build -w @cursor-gateway/shared
          npm run build -w @cursor-gateway/e2ee
          npm run build -w @cursor-gateway/secure-web

      - name: Generate application icons
        run: npm run icon -w @cursor-gateway/desktop

      - name: Run desktop shell unit tests
        run: cargo test --manifest-path apps/desktop/src-tauri/Cargo.toml

      - name: Build NSIS installer
        run: npm run tauri -w @cursor-gateway/desktop -- build --bundles nsis

      - name: Build MSI installer (optional)
        if: ${{ inputs.with_msi }}
        run: npm run tauri -w @cursor-gateway/desktop -- build --bundles msi

      - name: Collect artifacts + SHA256SUMS
        shell: pwsh
        run: |
          $out = "artifacts/desktop"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          $nsis = Get-ChildItem -Recurse "apps/desktop/src-tauri/target/release/bundle/nsis" -Filter *-setup.exe | Select-Object -First 1
          if (-not $nsis) { throw "NSIS installer not found" }
          Copy-Item $nsis.FullName "$out/cursor-gateway-desktop-setup.exe" -Force
          $msi = Get-ChildItem -Recurse "apps/desktop/src-tauri/target/release/bundle/msi" -Filter *.msi -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($msi) { Copy-Item $msi.FullName "$out/cursor-gateway-desktop-setup.msi" -Force }
          $ver = (Get-Content "apps/desktop/src-tauri/tauri.conf.json" -Raw | ConvertFrom-Json).version
          $h = (Get-FileHash "$out/cursor-gateway-desktop-setup.exe" -Algorithm SHA256).Hash.ToLower()
          @{ version = $ver; sha256 = $h } | ConvertTo-Json -Compress | Set-Content -Encoding utf8 "$out/version.json"
          Push-Location $out
          Get-ChildItem -File | Where-Object { $_.Name -ne 'SHA256SUMS' -and $_.Name -ne 'version.json' } | ForEach-Object {
            $hash = (Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower()
            "$hash  $($_.Name)"
          } | Set-Content -Encoding ascii SHA256SUMS
          Get-Content SHA256SUMS
          Get-Content version.json
          Pop-Location

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: cursor-gateway-desktop
          path: artifacts/desktop/*
          if-no-files-found: error

      - name: Attach to GitHub Release (tag builds)
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/desktop/*
