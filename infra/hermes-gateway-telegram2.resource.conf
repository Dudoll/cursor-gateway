# Drop into:
#   ~/.config/systemd/user/hermes-gateway-telegram2.service.d/zz-resource-limits.conf
# Then: systemctl --user daemon-reload && systemctl --user restart hermes-gateway-telegram2.service
#
# Single shared Hermes process for ≥3 Telegram chats + providers
# (csgateway | openai-codex | deepseek). Do not spawn per-chat processes.

[Service]
MemoryAccounting=true
CPUAccounting=true
MemoryHigh=384M
MemoryMax=512M
MemorySwapMax=128M
CPUQuota=100%
TasksMax=128
OOMPolicy=stop
StartLimitBurst=5
StartLimitIntervalSec=120
Environment=HERMES_DISABLE_MCP=1
Environment=CSGATEWAY_LOOPBACK_URL=http://127.0.0.1:18080
