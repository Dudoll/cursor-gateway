# csapi.joelzt.org — Anthropic/OpenAI compatible API facade (方案 B, plaintext).
#
# Proxies to the SAME app container as cs.joelzt.org (127.0.0.1:18080). The app
# serves the csapi routes under /v1/* and /health, authenticated by the csapi
# API key (NOT Cloudflare Access). Cloudflare (orange-cloud) terminates HTTPS.
#
# IMPORTANT: this endpoint is NOT end-to-end encrypted. Prompts are plaintext to
# csapi / the gateway / the runner / the model. Do not front it with Cloudflare
# Access (that is for human web login on cs.joelzt.org); csapi uses its own key.
server {
    server_tokens off;
    listen 80;
    listen [::]:80;
    server_name csapi.joelzt.org;

    access_log /var/log/nginx/csapi.joelzt.org.access.log;
    error_log /var/log/nginx/csapi.joelzt.org.error.log;

    # Room for large prompts / long message histories.
    client_max_body_size 16m;

    # Keep the origin unreachable from arbitrary clients: only Cloudflare's
    # edge should reach it (orange-cloud terminates TLS). Same allowlist as
    # cs.joelzt.org. Do NOT put a Cloudflare Access application in front of this
    # host — csapi authenticates with its own API key, not human SSO.
    allow 127.0.0.1;
    allow ::1;
    allow 173.245.48.0/20;
    allow 103.21.244.0/22;
    allow 103.22.200.0/22;
    allow 103.31.4.0/22;
    allow 141.101.64.0/18;
    allow 108.162.192.0/18;
    allow 190.93.240.0/20;
    allow 188.114.96.0/20;
    allow 197.234.240.0/22;
    allow 198.41.128.0/17;
    allow 162.158.0.0/15;
    allow 104.16.0.0/13;
    allow 104.24.0.0/14;
    allow 172.64.0.0/13;
    allow 131.0.72.0/22;
    allow 2400:cb00::/32;
    allow 2606:4700::/32;
    allow 2803:f800::/32;
    allow 2405:b500::/32;
    allow 2405:8100::/32;
    allow 2a06:98c0::/29;
    allow 2c0f:f248::/32;
    deny all;

    # Only expose the compatibility surface; everything else 404s so this host
    # never serves the web UI or the Cloudflare-Access-gated /api/*.
    location = /health {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /v1/ {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;

        # SSE streaming: disable buffering and allow long-lived responses.
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    location / {
        return 404;
    }
}
