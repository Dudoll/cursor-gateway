# csapi.joelzt.org — Anthropic/OpenAI compatible API facade (方案 B, plaintext).
#
# Proxies to the SAME app container as cs.joelzt.org (127.0.0.1:18080). The app
# serves the csapi routes under /v1/* and /health, authenticated by the csapi
# API key (NOT Cloudflare Access). Cloudflare (orange-cloud) terminates HTTPS
# and routes origin traffic to port 19604 (see CF origin rule), same as cs.
#
# IMPORTANT: this endpoint is NOT end-to-end encrypted. Prompts are plaintext to
# csapi / the gateway / the runner / the model. Do not front it with Cloudflare
# Access (that is for human web login on cs.joelzt.org); csapi uses its own key.

# Shared allowlist + proxy snippets via duplicated server blocks (port 80 + 19604).

server {
    server_tokens off;
    listen 80;
    listen [::]:80;
    server_name csapi.joelzt.org;

    access_log /var/log/nginx/csapi.joelzt.org.access.log;
    error_log /var/log/nginx/csapi.joelzt.org.error.log;

    client_max_body_size 16m;

    allow 127.0.0.1;
    allow ::1;
    allow 173.245.48.0/20;
    allow 103.21.244.0/22;
    allow 103.22.200.0/22;
    allow 103.31.4.0/22;
    allow 141.101.64.0/18;
    allow 108.162.192.0/18;
    allow 190.93.240.0/20;
    allow 188.114.96.0/20;
    allow 197.234.240.0/22;
    allow 198.41.128.0/17;
    allow 162.158.0.0/15;
    allow 104.16.0.0/13;
    allow 104.24.0.0/14;
    allow 172.64.0.0/13;
    allow 131.0.72.0/22;
    allow 2400:cb00::/32;
    allow 2606:4700::/32;
    allow 2803:f800::/32;
    allow 2405:b500::/32;
    allow 2405:8100::/32;
    allow 2a06:98c0::/29;
    allow 2c0f:f248::/32;
    deny all;

    location = /health {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /v1/ {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    # cg-mitm/1 secure channel (方案 A, application-layer E2EE ciphertext).
    # Same streaming-friendly proxy as /v1/; the app enforces the secure
    # handshake and only ciphertext transits this path.
    location /cg/v1/ {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_buffering off;
        proxy_cache off;
        proxy_set_header Connection "";
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        chunked_transfer_encoding on;
    }

    location / {
        return 404;
    }
}

server {
    # Cloudflare HTTPS origin after Reality took IPv4 443 (same as cs.joelzt.org).
    listen 19604 ssl;
    listen [::]:19604 ssl;
    http2 on;

    ssl_certificate /etc/v2ray-agent/tls/dmit.joelzt.org.crt;
    ssl_certificate_key /etc/v2ray-agent/tls/dmit.joelzt.org.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    server_tokens off;
    server_name csapi.joelzt.org;

    access_log /var/log/nginx/csapi.joelzt.org.access.log;
    error_log /var/log/nginx/csapi.joelzt.org.error.log;

    client_max_body_size 16m;

    allow 127.0.0.1;
    allow ::1;
    allow 173.245.48.0/20;
    allow 103.21.244.0/22;
    allow 103.22.200.0/22;
    allow 103.31.4.0/22;
    allow 141.101.64.0/18;
    allow 108.162.192.0/18;
    allow 190.93.240.0/20;
    allow 188.114.96.0/20;
    allow 197.234.240.0/22;
    allow 198.41.128.0/17;
    allow 162.158.0.0/15;
    allow 104.16.0.0/13;
    allow 104.24.0.0/14;
    allow 172.64.0.0/13;
    allow 131.0.72.0/22;
    allow 2400:cb00::/32;
    allow 2606:4700::/32;
    allow 2803:f800::/32;
    allow 2405:b500::/32;
    allow 2405:8100::/32;
    allow 2a06:98c0::/29;
    allow 2c0f:f248::/32;
    deny all;

    location = /health {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }

    location /v1/ {
