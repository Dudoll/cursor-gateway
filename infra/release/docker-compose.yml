name: cursor-gateway-release

services:
  app:
    image: cursor-gateway-release:latest
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    ports:
      - "127.0.0.1:18081:8080"
    env_file:
      - ../../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    mem_limit: 512m
    networks:
      - release

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - ../../.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    mem_limit: 384m
    networks:
      - release

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    mem_limit: 128m
    networks:
      - release

volumes:
  postgres-data:

networks:
  release:
    driver: bridge
