services:
  app:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "127.0.0.1:18080:8080"
    env_file:
      - ../.env
    volumes:
      - ../var/secrets:/app/var/secrets:ro
      - ../var/cg-mitm:/etc/cg-mitm:ro
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://127.0.0.1:8080/healthz',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - cursor-gateway

  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    env_file:
      - ../.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - cursor-gateway

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    networks:
      - cursor-gateway

  caddy:
    image: caddy:2-alpine
    profiles:
      - edge
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    depends_on:
      - app
    networks:
      - cursor-gateway

volumes:
  postgres-data:
  caddy-data:
  caddy-config:

networks:
  cursor-gateway:
    driver: bridge
