server {
    listen 80;
    listen [::]:80;
    server_name gateway.example.com;

    access_log /var/log/nginx/gateway.access.log;
    error_log /var/log/nginx/gateway.error.log;

    client_max_body_size 16m;

    # Disk-only static UI (keeps Node heap free of @fastify/static).
    location /assets/ {
        alias /var/www/cursor-gateway-web/assets/;
        expires 7d;
        add_header Cache-Control "public";
    }

    location = /index.html {
        root /var/www/cursor-gateway-web;
        add_header Cache-Control "no-store";
    }

    # Latest installers only — never served by Node (no RSS growth on download).
    location /releases/ {
        alias /var/www/cursor-gateway-releases/;
        add_header Cache-Control "no-store";
        types { application/zip zip; application/json json; }
    }

    location / {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Long-poll claim endpoints may hold ~25s.
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
    }
}
