log_format gateway_correlated escape=json
    '{"time":"$time_iso8601","remote":"$remote_addr","method":"$request_method",'
    '"uri":"$uri","status":$status,"request_id":"$upstream_http_x_request_id",'
    '"client_request_id":"$http_x_client_request_id","upstream_time":"$upstream_response_time"}';

server {
    listen 80;
    listen [::]:80;
    server_name gateway.example.com;

    access_log /var/log/nginx/gateway.access.log gateway_correlated;
    error_log /var/log/nginx/gateway.error.log;

    client_max_body_size 16m;

    location / {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
