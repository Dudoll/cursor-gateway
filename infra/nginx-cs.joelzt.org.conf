log_format gateway_correlated escape=json
    '{"time":"$time_iso8601","remote":"$remote_addr","method":"$request_method",'
    '"uri":"$uri","status":$status,"request_id":"$upstream_http_x_request_id",'
    '"client_request_id":"$http_x_client_request_id","upstream_time":"$upstream_response_time"}';

server {
    listen 80;
    listen [::]:80;
    server_name cs.joelzt.org;

    access_log /var/log/nginx/cs.joelzt.org.access.log gateway_correlated;
    error_log /var/log/nginx/cs.joelzt.org.error.log;

    client_max_body_size 16m;

    allow 127.0.0.1;
    allow ::1;
    allow 173.245.48.0/20;
    allow 103.21.244.0/22;
    allow 103.22.200.0/22;
    allow 103.31.4.0/22;
    allow 141.101.64.0/18;
    allow 108.162.192.0/18;
    allow 190.93.240.0/20;
    allow 188.114.96.0/20;
    allow 197.234.240.0/22;
    allow 198.41.128.0/17;
    allow 162.158.0.0/15;
    allow 104.16.0.0/13;
    allow 104.24.0.0/14;
    allow 172.64.0.0/13;
    allow 131.0.72.0/22;
    allow 2400:cb00::/32;
    allow 2606:4700::/32;
    allow 2803:f800::/32;
    allow 2405:b500::/32;
    allow 2405:8100::/32;
    allow 2a06:98c0::/29;
    allow 2c0f:f248::/32;
    deny all;

    location ^~ /api/automation/ {
        return 404;
    }

    location ^~ /api/hermes-runner/ {
        return 404;
    }

    # Disk-only UI assets (Node WEB_STATIC_ENABLED=0).
    location /assets/ {
        alias /var/www/cursor-gateway-web/assets/;
        expires 7d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options nosniff always;
    }

    # Latest installers only — do not stream via Node.
    location /releases/ {
        alias /var/www/cursor-gateway-releases/;
        add_header Cache-Control "no-store";
        add_header X-Content-Type-Options nosniff always;
        types { application/zip zip; application/json json; }
    }

    # The Node app has WEB_STATIC_ENABLED=0; serve the SPA entry from disk.
    location = / {
        root /var/www/cursor-gateway-web;
        try_files /index.html =404;
        add_header Cache-Control "no-cache";
        add_header X-Content-Type-Options nosniff always;
    }

    location / {
        proxy_pass http://127.0.0.1:18080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_connect_timeout 10s;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;

        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer always;
    }
}

server {
    listen 19604 ssl;
    listen [::]:19604 ssl;
    http2 on;

    ssl_certificate /etc/v2ray-agent/tls/dmit.joelzt.org.crt;
    ssl_certificate_key /etc/v2ray-agent/tls/dmit.joelzt.org.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    server_name cs.joelzt.org;

