server {
    server_tokens off;
    listen 80;
    listen [::]:80;
    server_name secure.joelzt.org;

    access_log /var/log/nginx/secure.joelzt.org.access.log;
    error_log /var/log/nginx/secure.joelzt.org.error.log;

    root /var/www/cursor-gateway-secure;
    index index.html;

    # SPA + PWA static hosting (Cloudflare orange-cloud terminates HTTPS)
    location / {
        try_files $uri $uri/ /index.html;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer always;
        add_header X-Frame-Options DENY always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=(), usb=(), publickey-credentials-get=(self), publickey-credentials-create=(self)" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'none'; frame-ancestors 'none'; object-src 'none'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self' https://cs.joelzt.org; worker-src 'self'" always;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache";
        add_header Service-Worker-Allowed "/";
    }

    location /assets/ {
        expires 7d;
        add_header Cache-Control "public, immutable";
    }
}
